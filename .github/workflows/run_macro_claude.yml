name: Run Macro Claude

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run macro_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # GMAIL_ADDRESS defaults to Medevereux@gmail.com in the script
          # RECIPIENT_EMAIL defaults to Michael.devereux@schroders.com in the script
          # Add secrets for these below if you ever need to override:
          # GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          # RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python macro_claude.py

      - name: Upload journal artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-claude-journal-${{ github.run_id }}
          path: macro_claude_journal.json
          if-no-files-found: ignore
